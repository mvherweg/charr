[project]
name = "charr-review"
version = "0.1.0"
description = "Charr review: browse charr-eval results image-by-image (expected vs predicted verdicts and the model's rationale)."
requires-python = ">=3.13"
license = "MIT"
authors = [{ name = "Michiel Van Herwegen", email = "michiel@vanherwegen.com" }]
# Depends on charr only (for the Verdict/RuleId vocabulary and CharrError). It deliberately does NOT depend on
# charr-eval: it re-declares the substrate record and reads the JSONL, treating the substrate as a published contract
# (the same dependency-avoidance pattern the manifest uses; docs/adr/0010, docs/adr/0022). Flask serves the local
# single-page app (docs/adr/0023).
dependencies = [
  "charr",
  "flask>=3",
  "pydantic>=2",
]

[project.scripts]
charr-review = "charr_review.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/charr_review"]

[tool.uv.sources]
charr = { workspace = true }
