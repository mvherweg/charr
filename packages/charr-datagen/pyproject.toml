[project]
name = "charr-datagen"
version = "0.1.0"
description = "Charr data generator: synthetic charts with ground-truth labels for benchmarking the checker."
requires-python = ">=3.13"
license = "MIT"
authors = [{ name = "Michiel Van Herwegen", email = "michiel@vanherwegen.com" }]
# Kept separate from the checker on purpose. Plotting backend and other
# dependencies are TBD; add them when first used, keeping the set minimal.
dependencies = []

[project.scripts]
charr-datagen = "charr_datagen.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/charr_datagen"]
