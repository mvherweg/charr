[project]
name = "charr-eval"
version = "0.1.0"
description = "Charr evaluator: score the checker against a labeled chart dataset in the manifest format."
requires-python = ">=3.13"
license = "MIT"
authors = [{ name = "Michiel Van Herwegen", email = "michiel@vanherwegen.com" }]
# Depends on charr (it drives the checker: run_check, the OpenAI-compatible client, config + credential loading, and the
# Verdict/RuleId vocabulary). It deliberately does NOT depend on charr-datagen: eval scores any dataset in the manifest
# format, generated or hand-curated, so it owns its own reader (docs/adr/0010, docs/adr/0011).
dependencies = [
  "charr",
  "pydantic>=2",
]

[project.scripts]
charr-eval = "charr_eval.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/charr_eval"]

[tool.uv.sources]
charr = { workspace = true }
